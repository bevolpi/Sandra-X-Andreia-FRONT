<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações de Gamificação</title>
    <link rel="stylesheet" href="/global.css">
</head>
<body>
    <nav class="navbar">
        <ul class="navbar-nav">
            <li><a href="/curador/dashboard.html" class="nav-link">Dashboard</a></li>
            <li><a href="/curador/aprovacao-cursos.html" class="nav-link">Aprovação de Cursos</a></li>
            <li><a href="/curador/gamificacao.html" class="nav-link active">Gamificação</a></li>
            <li><a href="/curador/monitoramento.html" class="nav-link">Monitoramento</a></li>
            <li><a href="/curador/usuarios.html" class="nav-link">Usuários</a></li>
            <li><a href="/logout" class="nav-link">Logout</a></li>
        </ul>
    </nav>
    <main class="main-content">
        <h1 class="page-title">Configurações de Gamificação</h1>
        <div class="cards-grid">
            <div class="card">
                <h2 class="card-title">Regras de Pontuação</h2>
                <div class="card-body">
                    <div class="form-group">
                        <label>Moedas por curso concluído</label>
                        <input type="number" class="form-input" value="50">
                    </div>
                    <div class="form-group">
                        <label>Moedas por participação no fórum</label>
                        <input type="number" class="form-input" value="10">
                    </div>
                    <button class="btn btn-success">Salvar</button>
                </div>
            </div>
            <div class="card">
                <h2 class="card-title">Catálogo de Prêmios</h2>
                <div class="card-body">
                    <button class="btn btn-primary">+ Novo Prêmio</button>
                    <div class="table-container">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Prêmio</th>
                                    <th>Custo (moedas)</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>Badge Ouro</td>
                                    <td>100</td>
                                    <td>
                                        <button class="btn btn-primary">Editar</button>
                                        <button class="btn btn-danger">Excluir</button>
                                    </td>
                                </tr>
                                <tr>
                                    <td>Certificado Premium</td>
                                    <td>200</td>
                                    <td>
                                        <button class="btn btn-primary">Editar</button>
                                        <button class="btn btn-danger">Excluir</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="/curador/curador.js"></script>
</body>
</html>
