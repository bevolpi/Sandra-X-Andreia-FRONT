<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EAD</title>
    <link rel="stylesheet" href="global.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        input {
            width: 100%;
            padding: 0.75rem;
            margin: 0.5rem 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button[type="submit"] {
            width: 100%;
            padding: 0.75rem;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }
        button[type="submit"]:hover {
            background: #45a049;
        }
        .links {
            text-align: center;
            margin: 1rem 0;
        }
        .links a {
            color: #007bff;
            text-decoration: none;
            margin: 0 0.5rem;
        }
        .social {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1rem;
        }
        .social button {
            flex: 1;
            padding: 0.5rem;
            background: #ddd;
            color: #333;
            border: none;
            border-radius: 4px;
            cursor: default;
        }
        #error {
            color: red;
            text-align: center;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Entrar</h2>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="senha" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>
        <div id="error"></div>
        <div class="links">
            <a href="#">Esqueci minha senha</a> | <a href="#">Criar conta</a>
        </div>
        <div class="social">
            <button>Google</button>
            <button>Microsoft</button>
            <button>Apple</button>
        </div>
    </div>
    <script src="db.js"></script>
    <script src="auth.js"></script>
</body>
</html>
