<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Certificados</title>
    <link rel="stylesheet" href="../global.css">
    <link rel="stylesheet" href="style/certificado.css">
</head>
<body>
    <!-- HEADER -->
    <header class="header">
      <nav class="navbar">
          <input type="checkbox" class="nav-toggle" id="nav-toggle">
          <div class="nav-left">
          <label for="nav-toggle" class="nav-toggle-label">
              <span></span>
              <span></span>
              <span></span>
          </label>
          <a href="dashboard.html" class="logo">EdTech</a>
          </div>
          <ul class="menu">
          <li><a href="boletim.html">Boletim</a></li>
          <li><a href="conquistas.html">Conquistas</a></li>
          <li><a href="forum.html">Fórum</a></li>
          </ul>
          <div class="nav-right">
          <div class="avatar">JD</div>
          </div>
      </nav>
    </header>

    <!-- MAIN CONTAINER -->
    <div class="container">
        <!-- TOP BAR -->
        <div class="top-bar">
            <h1>Meus Certificados</h1>
            <button class="btn-mudar-plano">Mudar Plano</button>
        </div>

        <!-- STATS -->
        <div class="stats-section" id="statsSection">
            <div class="stat-card">
                <div class="stat-number" id="totalCursos">0</div>
                <div class="stat-label">Cursos Concluídos</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalHoras">0</div>
                <div class="stat-label">Horas de Aprendizado</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="mediaGeral">0</div>
                <div class="stat-label">Média Geral</div>
            </div>
        </div>

        <!-- FILTROS -->
        <div class="filtros-section">
            <button class="filtro-btn ativo" onclick="filtrarCertificados('todos')">Todos</button>
            <button class="filtro-btn" onclick="filtrarCertificados('tecnologia')">Tecnologia</button>
            <button class="filtro-btn" onclick="filtrarCertificados('negocios')">Negócios</button>
            <button class="filtro-btn" onclick="filtrarCertificados('design')">Design</button>
        </div>

        <!-- GRID DE CERTIFICADOS -->
        <div id="certificadosContainer" class="certificados-grid"></div>
    </div>

    <!-- MODAL DE COMPARTILHAMENTO -->
    <div id="modalCompartilhar" class="modal">
        <div class="modal-content">
            <div class="modal-header">Compartilhar Certificado</div>
            <div class="modal-body" id="modalCompartilharBody">
                Você será redirecionado para o LinkedIn para compartilhar seu certificado.
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="fecharModalCompartilhar()">Cancelar</button>
                <button class="btn-confirm" onclick="confirmarCompartilhamento()">Compartilhar</button>
            </div>
        </div>
    </div>

    <script>
        // Base de dados de certificados
        const certificados = [
            {
                id: 1,
                titulo: "React Avançado: Hooks e Context",
                categoria: "tecnologia",
                cargaHoraria: 40,
                media: 8.5,
                dataConclusao: "15 de Maio de 2026",
                aulasTotal: 30,
                atividadesTotal: 5,
                icon: "⚛️",
                gradiente: "gradient-1"
            },
            {
                id: 2,
                titulo: "JavaScript Básico",
                categoria: "tecnologia",
                cargaHoraria: 30,
                media: 9.0,
                dataConclusao: "10 de Maio de 2026",
                aulasTotal: 25,
                atividadesTotal: 4,
                icon: "📜",
                gradiente: "gradient-2"
            },
            {
                id: 3,
                titulo: "Design Thinking",
                categoria: "design",
                cargaHoraria: 20,
                media: 8.0,
                dataConclusao: "05 de Maio de 2026",
                aulasTotal: 15,
                atividadesTotal: 3,
                icon: "🎨",
                gradiente: "gradient-3"
            },
            {
                id: 4,
                titulo: "Gestão de Projetos Ágil",
                categoria: "negocios",
                cargaHoraria: 35,
                media: 8.7,
                dataConclusao: "01 de Maio de 2026",
                aulasTotal: 28,
                atividadesTotal: 5,
                icon: "📊",
                gradiente: "gradient-4"
            },
            {
                id: 5,
                titulo: "Python para Data Science",
                categoria: "tecnologia",
                cargaHoraria: 50,
                media: 9.2,
                dataConclusao: "25 de Abril de 2026",
                aulasTotal: 40,
                atividadesTotal: 6,
                icon: "🐍",
                gradiente: "gradient-5"
            },
            {
                id: 6,
                titulo: "UI/UX Design Avançado",
                categoria: "design",
                cargaHoraria: 45,
                media: 8.3,
                dataConclusao: "20 de Abril de 2026",
                aulasTotal: 35,
                atividadesTotal: 5,
                icon: "🎭",
                gradiente: "gradient-6"
            }
        ];

        let filtroAtual = "todos";
        let certificadoCompartilhando = null;

        // Inicializar página
        function inicializar() {
            renderizarCertificados();
            atualizarStats();
        }

        // Renderizar certificados
        function renderizarCertificados() {
            const container = document.getElementById('certificadosContainer');
            
            const certificadosFiltrados = filtroAtual === 'todos' 
                ? certificados 
                : certificados.filter(c => c.categoria === filtroAtual);

            if (certificadosFiltrados.length === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1 / -1;">
                        <div class="empty-state">
                            <div class="empty-state-icon">📚</div>
                            <div class="empty-state-title">Nenhum certificado encontrado</div>
                            <div class="empty-state-text">Comece um novo curso e ganhe seu primeiro certificado!</div>
                            <button class="btn-comecal">Explorar Cursos</button>
                        </div>
                    </div>
                `;
                return;
            }

            container.innerHTML = certificadosFiltrados.map(cert => `
                <div class="certificado-card">
                    <div class="certificado-card-header ${cert.gradiente}">
                        ${cert.icon}
                    </div>
                    <div class="certificado-card-body">
                        <div class="certificado-card-title">${cert.titulo}</div>
                        <div class="certificado-card-info">
                            <div class="certificado-card-info-item">
                                <span class="certificado-card-info-label">Carga Horária:</span>
                                <span class="certificado-card-info-value">${cert.cargaHoraria}h</span>
                            </div>
                            <div class="certificado-card-info-item">
                                <span class="certificado-card-info-label">Média:</span>
                                <span class="certificado-card-info-value">${cert.media.toFixed(1)}/10</span>
                            </div>
                            <div class="certificado-card-info-item">
                                <span class="certificado-card-info-label">Concluído em:</span>
                                <span class="certificado-card-info-value">${cert.dataConclusao}</span>
                            </div>
                        </div>
                    </div>
                    <div class="certificado-card-footer">
                        <a href="conclusao_certificado.html?id=${cert.id}" class="btn-visualizar">
                            👁️ Visualizar
                        </a>
                        <button class="btn-compartilhar" onclick="abrirModalCompartilhar(${cert.id})">
                            🔗
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Filtrar certificados
        function filtrarCertificados(categoria) {
            filtroAtual = categoria;
            
            // Atualizar botões de filtro
            document.querySelectorAll('.filtro-btn').forEach(btn => {
                btn.classList.remove('ativo');
            });
            event.target.classList.add('ativo');

            renderizarCertificados();
        }

        // Atualizar estatísticas
        function atualizarStats() {
            const totalCursos = certificados.length;
            const totalHoras = certificados.reduce((sum, c) => sum + c.cargaHoraria, 0);
            const mediaGeral = (certificados.reduce((sum, c) => sum + c.media, 0) / certificados.length).toFixed(1);

            document.getElementById('totalCursos').textContent = totalCursos;
            document.getElementById('totalHoras').textContent = totalHoras;
            document.getElementById('mediaGeral').textContent = mediaGeral;
        }

        // Modal de compartilhamento
        function abrirModalCompartilhar(id) {
            certificadoCompartilhando = certificados.find(c => c.id === id);
            const modal = document.getElementById('modalCompartilhar');
            const body = document.getElementById('modalCompartilharBody');
            
            body.innerHTML = `Você está prestes a compartilhar o certificado de "<strong>${certificadoCompartilhando.titulo}</strong>" no LinkedIn.`;
            modal.style.display = 'block';
        }

        function fecharModalCompartilhar() {
            document.getElementById('modalCompartilhar').style.display = 'none';
        }

        function confirmarCompartilhamento() {
            if (certificadoCompartilhando) {
                const mensagem = `Acabei de concluir o curso "${certificadoCompartilhando.titulo}" com sucesso! 🎓\n\nCarga horária: ${certificadoCompartilhando.cargaHoraria}h\nMédia final: ${certificadoCompartilhando.media.toFixed(1)}/10\n\nEstou evoluindo continuamente em minha jornada de aprendizado! 🚀 #Educação #Aprendizado #Certificado`;
                
                const urlLinkedin = `https://www.linkedin.com/feed/?linkOrigin=LI_BADGE`;
                window.open(urlLinkedin, '_blank');
                
                alert(`Mensagem preparada para compartilhamento:\n\n${mensagem}`);
            }
            fecharModalCompartilhar();
        }

        // Fechar modal ao clicar fora
        window.onclick = function(event) {
            const modal = document.getElementById('modalCompartilhar');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        }

        // Inicializar ao carregar
        document.addEventListener('DOMContentLoaded', inicializar);
    </script>
</body>
</html>
